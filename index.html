<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acme — Contact</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --fc-bg: #0f172a;
      --fc-surface: #ffffff;
      --fc-muted: #64748b;
      --fc-text: #0f172a;
      --fc-primary: #2563eb;
      --fc-primary-dark: #1d4ed8;
      --fc-border: #e2e8f0;
      --fc-error: #dc2626;
      --fc-radius: 12px;
      --fc-maxw: 1120px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--fc-text); }

    /* ---------- Footer ---------- */
    .fc-footer {
      background: var(--fc-bg);
      color: #cbd5e1;
      padding: 64px 24px 32px;
    }
    .fc-footer__top {
      max-width: var(--fc-maxw);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.2fr 2fr;
      gap: 48px;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .fc-footer__logo {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .fc-footer__tagline {
      margin: 12px 0 20px;
      color: #94a3b8;
      line-height: 1.6;
      max-width: 320px;
    }
    .fc-footer__newsletter {
      display: flex;
      gap: 8px;
      max-width: 360px;
    }
    .fc-footer__newsletter-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .fc-footer__newsletter-input:focus { border-color: var(--fc-primary); }
    .fc-footer__newsletter-btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: var(--fc-primary);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s;
    }
    .fc-footer__newsletter-btn:hover { background: var(--fc-primary-dark); }

    .fc-footer__nav {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }
    .fc-footer__nav-title {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .fc-footer__nav-list { list-style: none; margin: 0; padding: 0; }
    .fc-footer__nav-list li { margin-bottom: 10px; }
    .fc-footer__nav-link {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      transition: color .2s;
    }
    .fc-footer__nav-link:hover { color: #fff; }

    .fc-footer__bottom {
      max-width: var(--fc-maxw);
      margin: 0 auto;
      padding-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .fc-footer__copy { color: #64748b; font-size: 13px; margin: 0; }
    .fc-footer__social { display: flex; gap: 12px; }
    .fc-footer__social-link {
      width: 36px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
      text-decoration: none;
      font-size: 14px;
      transition: background .2s, color .2s, transform .2s;
    }
    .fc-footer__social-link:hover {
      background: var(--fc-primary);
      color: #fff;
      transform: translateY(-2px);
    }
    .fc-footer__legal { display: flex; gap: 20px; }
    .fc-footer__legal a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 13px;
      transition: color .2s;
    }
    .fc-footer__legal a:hover { color: #fff; }

    /* ---------- Contact ---------- */
    .fc-contact {
      background: #f8fafc;
      padding: 80px 24px;
      color: var(--fc-text);
    }
    .fc-contact__inner { max-width: var(--fc-maxw); margin: 0 auto; }
    .fc-contact__header { text-align: center; margin-bottom: 48px; }
    .fc-contact__header h1 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
    }
    .fc-contact__header p { color: var(--fc-muted); font-size: 16px; max-width: 520px; margin: 0 auto; line-height: 1.6; }

    .fc-contact__grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 48px;
      align-items: start;
    }
    .fc-contact__aside {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .fc-contact__info h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--fc-muted);
      margin: 0 0 6px;
      font-weight: 600;
    }
    .fc-contact__info a, .fc-contact__info p {
      color: var(--fc-text);
      text-decoration: none;
      font-size: 16px;
      line-height: 1.5;
      margin: 0;
    }
    .fc-contact__info a:hover { color: var(--fc-primary); }

    .fc-contact__form {
      background: var(--fc-surface);
      border: 1px solid var(--fc-border);
      border-radius: var(--fc-radius);
      padding: 32px;
      box-shadow: 0 1px 3px rgba(15,23,42,0.04), 0 10px 30px rgba(15,23,42,0.06);
    }
    .fc-field { margin-bottom: 20px; }
    .fc-field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .fc-field input, .fc-field textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--fc-border);
      background: #fff;
      color: var(--fc-text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      box-sizing: border-box;
    }
    .fc-field input:focus, .fc-field textarea:focus {
      border-color: var(--fc-primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    .fc-input--error { border-color: var(--fc-error) !important; }
    .fc-error {
      display: block;
      color: var(--fc-error);
      font-size: 13px;
      margin-top: 6px;
    }
    .fc-contact__submit {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: var(--fc-primary);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .fc-contact__submit:hover:not(:disabled) { background: var(--fc-primary-dark); }
    .fc-contact__submit:active:not(:disabled) { transform: translateY(1px); }
    .fc-contact__submit:disabled { opacity: 0.7; cursor: not-allowed; }

    /* ---------- Responsive ---------- */
    @media (max-width: 860px) {
      .fc-footer__top { grid-template-columns: 1fr; gap: 32px; }
      .fc-contact__grid { grid-template-columns: 1fr; gap: 32px; }
    }
    @media (max-width: 560px) {
      .fc-footer__nav { grid-template-columns: 1fr 1fr; gap: 24px; }
      .fc-footer__bottom { flex-direction: column; align-items: flex-start; }
      .fc-footer__newsletter { flex-direction: column; }
      .fc-contact__form { padding: 24px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const SOCIAL_LINKS = [
      { label: "Twitter", href: "https://twitter.com", icon: "𝕏" },
      { label: "GitHub", href: "https://github.com", icon: "🐙" },
      { label: "LinkedIn", href: "https://linkedin.com", icon: "in" },
      { label: "Dribbble", href: "https://dribbble.com", icon: "●" },
    ];

    const NAV_COLUMNS = [
      {
        title: "Product",
        links: [
          { label: "Features", href: "#features" },
          { label: "Pricing", href: "#pricing" },
          { label: "Changelog", href: "#changelog" },
          { label: "Roadmap", href: "#roadmap" },
        ],
      },
      {
        title: "Company",
        links: [
          { label: "About", href: "#about" },
          { label: "Blog", href: "#blog" },
          { label: "Careers", href: "#careers" },
          { label: "Press", href: "#press" },
        ],
      },
      {
        title: "Resources",
        links: [
          { label: "Docs", href: "#docs" },
          { label: "Support", href: "#support" },
          { label: "Community", href: "#community" },
          { label: "Status", href: "#status" },
        ],
      },
    ];

    function Footer() {
      const [email, setEmail] = useState("");
      const [subscribed, setSubscribed] = useState(false);

      const handleSubscribe = (e) => {
        e.preventDefault();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return;
        setSubscribed(true);
        setEmail("");
        setTimeout(() => setSubscribed(false), 3000);
      };

      return (
        <footer className="fc-footer">
          <div className="fc-footer__top">
            <div className="fc-footer__brand">
              <div className="fc-footer__logo">Acme</div>
              <p className="fc-footer__tagline">
                Build faster. Ship smarter. Delight your users.
              </p>
              <form className="fc-footer__newsletter" onSubmit={handleSubscribe}>
                <input
                  type="email"
                  placeholder="Enter your email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  aria-label="Email for newsletter"
                  className="fc-footer__newsletter-input"
                />
                <button type="submit" className="fc-footer__newsletter-btn">
                  {subscribed ? "Subscribed!" : "Subscribe"}
                </button>
              </form>
            </div>

            <div className="fc-footer__nav">
              {NAV_COLUMNS.map((col) => (
                <div key={col.title} className="fc-footer__nav-col">
                  <h4 className="fc-footer__nav-title">{col.title}</h4>
                  <ul className="fc-footer__nav-list">
                    {col.links.map((link) => (
                      <li key={link.label}>
                        <a href={link.href} className="fc-footer__nav-link">
                          {link.label}
                        </a>
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
          </div>

          <div className="fc-footer__bottom">
            <p className="fc-footer__copy">
              © {new Date().getFullYear()} Acme Inc. All rights reserved.
            </p>
            <div className="fc-footer__social">
              {SOCIAL_LINKS.map((s) => (
                <a
                  key={s.label}
                  href={s.href}
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label={s.label}
                  className="fc-footer__social-link"
                >
                  <span aria-hidden="true">{s.icon}</span>
                </a>
              ))}
            </div>
            <div className="fc-footer__legal">
              <a href="#privacy">Privacy</a>
              <a href="#terms">Terms</a>
              <a href="#cookies">Cookies</a>
            </div>
          </div>
        </footer>
      );
    }

    function ContactPage() {
      const [form, setForm] = useState({ name: "", email: "", message: "" });
      const [status, setStatus] = useState("idle");
      const [errors, setErrors] = useState({});

      const validate = () => {
        const next = {};
        if (!form.name.trim()) next.name = "Name is required";
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email))
          next.email = "Valid email is required";
        if (form.message.trim().length < 10)
          next.message = "Message must be at least 10 characters";
        setErrors(next);
        return Object.keys(next).length === 0;
      };

      const handleChange = (e) => {
        const { name, value } = e.target;
        setForm((f) => ({ ...f, [name]: value }));
        if (errors[name]) setErrors((er) => ({ ...er, [name]: undefined }));
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!validate()) return;
        setStatus("sending");
        try {
          await new Promise((res) => setTimeout(res, 800));
          setStatus("sent");
          setForm({ name: "", email: "", message: "" });
          setTimeout(() => setStatus("idle"), 4000);
        } catch (err) {
          setStatus("error");
          setTimeout(() => setStatus("idle"), 4000);
        }
      };

      return (
        <section className="fc-contact">
          <div className="fc-contact__inner">
            <header className="fc-contact__header">
              <h1>Get in touch</h1>
              <p>
                Questions, feedback, or just want to say hi? We usually reply
                within one business day.
              </p>
            </header>

            <div className="fc-contact__grid">
              <aside className="fc-contact__aside">
                <div className="fc-contact__info">
                  <h3>Email</h3>
                  <a href="mailto:hello@acme.com">hello@acme.com</a>
                </div>
                <div className="fc-contact__info">
                  <h3>Phone</h3>
                  <a href="tel:+18005551234">+1 (800) 555-1234</a>
                </div>
                <div className="fc-contact__info">
                  <h3>Office</h3>
                  <p>123 Market Street, Suite 400<br />San Francisco, CA 94103</p>
                </div>
                <div className="fc-contact__info">
                  <h3>Hours</h3>
                  <p>Mon–Fri, 9am–6pm PT</p>
                </div>
              </aside>

              <form className="fc-contact__form" onSubmit={handleSubmit} noValidate>
                <div className="fc-field">
                  <label htmlFor="name">Name</label>
                  <input
                    id="name"
                    name="name"
                    type="text"
                    value={form.name}
                    onChange={handleChange}
                    className={errors.name ? "fc-input--error" : ""}
                    placeholder="Jane Doe"
                  />
                  {errors.name && <span className="fc-error">{errors.name}</span>}
                </div>

                <div className="fc-field">
                  <label htmlFor="email">Email</label>
                  <input
                    id="email"
                    name="email"
                    type="email"
                    value={form.email}
                    onChange={handleChange}
                    className={errors.email ? "fc-input--error" : ""}
                    placeholder="jane@example.com"
                  />
                  {errors.email && <span className="fc-error">{errors.email}</span>}
                </div>

                <div className="fc-field">
                  <label htmlFor="message">Message</label>
                  <textarea
                    id="message"
                    name="message"
                    rows={5}
                    value={form.message}
                    onChange={handleChange}
                    className={errors.message ? "fc-input--error" : ""}
                    placeholder="Tell us how we can help…"
                  />
                  {errors.message && (
                    <span className="fc-error">{errors.message}</span>
                  )}
                </div>

                <button
                  type="submit"
                  className="fc-contact__submit"
                  disabled={status === "sending"}
                >
                  {status === "sending" && "Sending…"}
                  {status === "sent" && "Message sent!"}
                  {status === "error" && "Try again"}
                  {status === "idle" && "Send message"}
                </button>
              </form>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <>
          <ContactPage />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
